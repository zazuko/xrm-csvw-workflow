name: Transform

on: [push, pull_request]

jobs:
  transform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm install
      - run: npm start
      - uses: actions/upload-artifact@v4
        with:
          name: transformed.nt
          path: output/transformed.nt
